name: dm_bhatt_classes_new
description: "A new Flutter project for DM Bhatt Classes."
publish_to: 'none'

version: 1.0.0+11

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.3
  connectivity_plus: ^6.0.3

  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  pinput: ^6.0.1
  url_launcher: ^6.3.2
  image_picker: ^1.2.1
  file_picker: ^10.3.8
  http: ^1.6.0

  intl: ^0.20.2
  shared_preferences: ^2.2.2
  excel: ^4.0.6
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  universal_html: ^2.3.0
  google_generative_ai: ^0.4.7
  open_filex: ^4.7.0
  pdf: ^3.11.3
  syncfusion_flutter_pdf: ^32.2.5
  printing: ^5.14.2
  screenshot: ^3.0.0
  share_plus: ^12.0.1
  fl_chart: ^1.2.0
  package_info_plus: ^9.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1   # ✅ only version here

flutter_launcher_icons:              # ✅ move config OUTSIDE
  android: true
  ios: true
  image_path: "assets/ic_launcher.png"
  remove_alpha_ios: true
  background_color_ios: "#ffffff"

flutter:
  uses-material-design: true
  assets:
    - assets/app_icons/
    - assets/images/
    - assets/fonts/
